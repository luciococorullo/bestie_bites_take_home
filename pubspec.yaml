name: bestie_bites_take_home
description: "Cucine in città — micro-app Flutter single-screen: cerca una città e sfoglia le cucine disponibili."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  dio: ^5.9.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.0+1
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  riverpod_lint: ^3.1.0
  custom_lint: ^0.8.1
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
